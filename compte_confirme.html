<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Compte confirmé · Joyglo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      background: linear-gradient(160deg, #F6E4CC 0%, #F2EFE6 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #2D3A2E;
    }
    .card {
      background: #FBF9F3;
      border: 1px solid #A4B494;
      border-radius: 24px;
      max-width: 420px;
      width: 100%;
      padding: 40px 32px;
      text-align: center;
      box-shadow: 0 8px 30px rgba(45,58,46,0.08);
    }
    .leaf { font-size: 56px; margin-bottom: 16px; }
    h1 {
      font-size: 24px;
      margin-bottom: 12px;
      color: #2D3A2E;
    }
    p {
      font-size: 16px;
      line-height: 1.6;
      color: #5B7553;
      margin-bottom: 8px;
    }
    .brand {
      margin-top: 28px;
      font-size: 22px;
      letter-spacing: 3px;
      font-weight: bold;
      color: #2D3A2E;
    }
    .tag {
      font-size: 13px;
      color: #A4B494;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="leaf">🌱</div>
    <h1>Ton compte est confirmé !</h1>
    <p>Bienvenue dans la communauté Joyglo.</p>
    <p>Tu peux maintenant retourner dans l'application et te connecter pour commencer à cultiver ton jardin de petits bonheurs.</p>
    <div class="brand">JOYGLO</div>
    <div class="tag">Cultive ton jardin de petits bonheurs</div>
  </div>
</body>
</html>
